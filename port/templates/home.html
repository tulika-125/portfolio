{% extends "base.html" %}

{% block content %}
<div class="dashboard-grid">
    <!-- Hero Section -->
    <section class="hero-split">
        <div class="hero-image-area">
            <div class="profile-glow-circle">
                {% if data.profile_image %}
                <img src="{{ url_for('static', filename=data.profile_image) }}" alt="{{ data.name }}">
                {% else %}
                <div class="profile-avatar-placeholder">TM</div>
                {% endif %}
            </div>
        </div>

        <div class="hero-content">
            <p class="tech-stack"><span class="tech-tag">Hello!</span></p>
            <h1 class="profile-name">I'm <span>{{ data.name }}</span></h1>
            <p class="profile-role">{{ data.role }}</p>
            <p class="about-text">{{ data.about }}</p>

            <div class="profile-actions">
                <a href="{{ url_for('download_resume') }}" class="btn btn-primary">Download Resume</a>
            </div>

            <div class="social-links">
                <a href="mailto:{{ data.contact.email }}" class="social-icon" data-popup="{{ data.contact.email }}"
                    aria-label="Email">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="16" x="2" y="4" rx="2" />
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                    </svg>
                </a>
                <a href="tel:{{ data.contact.phone }}" class="social-icon" data-popup="{{ data.contact.phone }}"
                    aria-label="Phone">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                    </svg>
                </a>
                <a href="{{ data.contact.linkedin }}" target="_blank" class="social-icon" data-popup="LinkedIn/Tulika"
                    aria-label="LinkedIn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />
                        <rect width="4" height="12" x="2" y="9" />
                        <circle cx="4" cy="4" r="2" />
                    </svg>
                </a>
            </div>
        </div>
    </section>

    <!-- Main Overview -->
    <div class="main-content">

        <!-- Skills Section -->
        <div class="card section-card">
            <h2>Technical Proficiency</h2>
            <div class="skills-tags-container">
                {% for skill in data.skills_detailed %}
                <span class="tech-tag skill-tag-large">{{ skill.name }}</span>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
