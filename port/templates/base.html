<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ data.name }} - Portfolio Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#home" class="nav-logo">TULIKA<span>.</span></a>
            <div class="nav-links">
                <a href="#home" class="nav-link">Home</a>
                <a href="#projects" class="nav-link">Projects</a>
                <a href="#experience" class="nav-link">Experience</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <div id="mouse-glow"></div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='chat.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const glow = document.getElementById('mouse-glow');
            // Mouse Glow & Parallel Background
            const bgBloom = document.querySelector('body::before'); // Reference for parallax hook
            document.addEventListener('mousemove', (e) => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';

                // Subtle Parallax
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                document.body.style.setProperty('--bg-move-x', moveX + 'px');
                document.body.style.setProperty('--bg-move-y', moveY + 'px');
            });

            // Scroll Reveal Logic
            const observerOptions = {
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('reveal');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.section-card').forEach(card => {
                observer.observe(card);
            });
        });
    </script>
</body>

</html>
